spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: spendanalytic

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET}
    access: ${JWT_ACCESS:900000}
    refresh: ${JWT_REFRESH:86400000}
